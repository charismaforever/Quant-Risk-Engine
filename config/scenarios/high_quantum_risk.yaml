name: high_quantum_risk
description: >
  Aggressive quantum risk scenario. Assumes faster-than-expected CRQC arrival
  (5 years), minimal migration budget, and critical data sensitivity.
  Designed to stress-test the quantum risk module with pessimistic assumptions.

random_seed: 123

quantum_crypto:
  encryption_standard: ECC-256
  migration_target: CRYSTALS-Dilithium
  years_to_cryptographically_relevant_qc: 5
  migration_budget_usd: 500000
  hndl_data_sensitivity: critical
  simulation_horizon_years: 8

adversarial_ai:
  attack_types:
    - evasion
    - poisoning
  model_architecture: neural_network
  training_data_exposure: 0.25
  defense_mechanisms:
    - input_validation
  alpha_signal_value_usd: 100000000

threat_intel:
  sector: financial_services
  threat_actors:
    - Lazarus
    - APT41
  prior_breach_probability: 0.25
  mitre_framework_version: "14.1"
  geographic_region: north_america

financial_risk:
  portfolio_value_usd: 1000000000
  confidence_level: 0.99
  time_horizon_days: 252
  n_simulations: 20000
  cyber_shock_distribution: gev
  correlation_with_market: 0.35
  asset_classes:
    - equities
    - alternatives
