name: well_defended
description: >
  Best-practice defense scenario. Assumes strong PQC migration budget,
  comprehensive adversarial ML defenses, and lower threat actor exposure.
  Useful as a baseline for measuring the value of security investment.

random_seed: 777

quantum_crypto:
  encryption_standard: AES-256
  migration_target: CRYSTALS-Kyber
  years_to_cryptographically_relevant_qc: 10
  migration_budget_usd: 5000000
  hndl_data_sensitivity: medium
  simulation_horizon_years: 10

adversarial_ai:
  attack_types:
    - evasion
    - poisoning
  model_architecture: random_forest
  training_data_exposure: 0.05
  defense_mechanisms:
    - adversarial_training
    - ensemble_defense
    - differential_privacy
    - input_validation
  alpha_signal_value_usd: 30000000

threat_intel:
  sector: financial_services
  threat_actors:
    - FIN7
  prior_breach_probability: 0.10
  mitre_framework_version: "14.1"
  geographic_region: north_america

financial_risk:
  portfolio_value_usd: 500000000
  confidence_level: 0.99
  time_horizon_days: 252
  n_simulations: 10000
  cyber_shock_distribution: pareto
  correlation_with_market: 0.15
  asset_classes:
    - equities
    - fixed_income
    - alternatives
